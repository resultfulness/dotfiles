[c]
darkgrey = #2b2c34
red = #e06c75
green = #98c379
yellow = #e5c07b
blue = #61afef
purple = #c678dd
cyan = #56b6c2
lightgray = #abb2bf

background = #1f2329
background-alt = #282c34
foreground = #abb2bf
primary = #c678dd
secondary = #eeeff2
alert = #e06c75
disabled = #737f95

[bar/example]
width = 100%
height = 40

fixed-center = true

bottom = false

background = ${c.background}
foreground = ${c.foreground}

line-size = 2

border-size = 0
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator =

font-0 = FiraCode Nerd Font:size=12;2
font-1 = FiraCode Nerd Font:size=16;3
font-2 = Noto Color Emoji:scale=6;4

modules-left = rofi rofi-powermenu bspwm xwindow
modules-center = xkill datetime
modules-right = pulseaudio cpu memory eth wlan xkeyboard battery

tray-position = right

wm-restack = bspwm
;wm-restack = i3

override-redirect = false

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = false

[module/xwindow]
type = internal/xwindow
format = <label>
label-empty = arch linux
label = %title:0:60:...%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock

format-prefix = "ůįĆĆ "
format-prefix-font = 2
format-prefix-foreground = ${c.primary}
 
label-layout = %layout% %variant%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /
mount-1 = /home

label-mounted = %{F#c678dd}%mountpoint%%{F-} ÔĄÖ %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${c.disabled}

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
enable-click = true
enable-scroll = true
format-padding = 1
format = <label-state>
label-monitor = %name%
icon-default = "Ôą≠"
label-active = %index%
label-active-foreground = ${c.secondary}
label-active-background = ${c.background-alt}
label-active-underline = ${c.primary}
label-active-padding = 1
label-occupied = %index%
label-occupied-foreground = ${c.secondary}
label-occupied-padding = 1
label-urgent = %index%!
label-urgent-foreground = ${c.alert}
label-urgent-padding = 1
label-empty = Ó™ľ
label-empty-foreground = ${c.secondary}
label-empty-padding = 1

[module/bspwm]
type = internal/bspwm

reverse-scroll = false

label-focused-foreground = ${c.secondary}
label-focused = %index%
label-focused-background = ${c.background-alt}
label-focused-overline = ${c.primary}
label-focused-padding = 1

label-occupied = %index%
label-occupied-foreground = ${c.secondary}
label-occupied-padding = 1

label-urgent = ůįÄ¶
label-urgent-background = ${c.alert}
label-urgent-padding = 1

label-empty = Ó™ľ
label-empty-foreground = ${c.secondary}
label-empty-padding = 1

; Separator in between workspaces
; label-separator = |

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-font = 2
format-prefix-foreground = ${c.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįĄ® "
format-prefix-font = 2
format-prefix-foreground = ${c.primary}
label = %gb_used%

[module/wlan]
type = internal/network
interval = 5

interface-type = wireless

format-connected = <ramp-signal> <label-connected>
format-connected-prefix = "%{A3:nm-connection-editor:}ůįĖ© "
format-connected-prefix-font = 2
format-connected-prefix-foreground = ${c.primary}
format-disconnected = <label-disconnected>

label-connected = %essid%%{A}

label-disconnected = %ifname% disconnected
label-disconnected-foreground = ${c.disabled}

ramp-signal-0 = ūüė≠
ramp-signal-1 = ūüėĘ
ramp-signal-2 = ūüėí
ramp-signal-3 = ūüėä
ramp-signal-4 = ūüėĄ
ramp-signal-5 = ūüėć

[module/eth]
type = internal/network
interval = 5

interface-type = wired

format-connected = <label-connected>
format-connected-prefix = "%{A3:nm-connection-editor:}ůįąÄ "
format-connected-prefix-font = 2
format-connected-prefix-foreground = ${c.primary}
format-disconnected = <label-disconnected>

label-connected = %local_ip%%{A}

label-disconnected = %ifname% disconnected
label-disconnected-foreground = ${c.disabled}

[module/datetime]
type = internal/date

date = %A, %d %B
date-alt = %d-%m-%Y

time = %H:%M:%S
time-alt = %H:%M:%S

label-foreground = ${c.secondary} 
label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįēĺ "
format-volume-prefix-font = 2
format-volume-prefix-foreground = ${c.primary}
format-volume = <label-volume> 

label-volume = %percentage%%

format-muted-prefix = "ůįĖĀ "
format-muted-prefix-font = 2
format-muted-foreground = ${c.disabled}
format-muted = <label-muted> 

label-muted = "..."

click-right = pavucontrol &

[module/battery]
type = internal/battery

full-at = 99

low-at = 5

battery = BAT1
adapter = ADP1

poll-interval = 5

; see "man date" for details on how to format the time string
; NOTE: if you want to use syntax tags here you need to use %%{...}
; Default: %H:%M:%S
time-format = %H:%M


format-charging = <label-charging>
format-charging-prefix = "ůįāĄ "
format-charging-prefix-foreground = ${c.primary}
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-foreground = ${c.primary}
format-full = <label-full>
format-full-prefix = "ůįĀĻ "
format-full-prefix-foreground = ${c.primary}
format-low = ůįāÉ <label-low>
format-low-foreground = ${c.alert}


label-charging = %percentage%%, ~%time% left
label-discharging = %percentage%%, ~%time% left
label-discharging-foreground = ${c.foreground}
label-full = battery full
label-low = %percentage%, ~%time% left!

ramp-capacity-0 = ůįāé
ramp-capacity-1 = ůįĀļ
ramp-capacity-2 = ůįĀĽ
ramp-capacity-3 = ůįĀľ
ramp-capacity-4 = ůįĀĹ
ramp-capacity-5 = ůįĀĺ
ramp-capacity-6 = ůįĀŅ
ramp-capacity-7 = ůįĀŅ
ramp-capacity-8 = ůįāĀ
ramp-capacity-9 = ůįāā

[module/powermenu]
type = custom/menu

expand-right = false

format-spacing = 1

label-open = ÔÄĎ 
label-open-foreground = ${c.foreground-alt}
label-close = Ôźź cancel
label-close-foreground = ${c.foreground-alt}
label-separator = " : "
label-separator-foreground = ${c.foreground-alt}

menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = power off
menu-0-1-exec = menu-open-2

menu-1-0 = cancel
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = sudo reboot

menu-2-0 = power off
menu-2-0-exec = sudo poweroff
menu-2-1 = cancel
menu-2-1-exec = menu-open-0

[settings]
screenchange-reload = true
pseudo-transparency = true

[module/kernel]
type = custom/script
exec = uname -r
tail = false
interval = 1024


[module/rofi]
type = custom/text
content ="ůį£ź"
content-font = 2
content-foreground = ${c.primary}
click-left = ~/.config/rofi/launchers/type-1/launcher.sh

[module/xkill]
type = custom/text
content ="ůįßĽ"
content-font = 2
content-foreground = ${c.red}
click-left = sleep 0.1 && xkill > /dev/null 2>&1 &

[module/rofi-powermenu]
type = custom/text
content ="ůįź•"
content-font = 2
content-foreground = ${c.primary}
click-left = ~/.config/rofi/powermenu/type-3/powermenu.sh

; vim:ft=dosini
